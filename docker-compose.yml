services:
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_UPDATE_CHECK_ENABLED=false
      # Отключаем автоустановку плагинов
      - GF_PLUGINS_ENABLE_ALF=false
  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    command: --path.rootfs=/host
    network_mode: host
    pid: host
    volumes:
      - /:/host:ro,rslave

  db:
    image: postgres:15
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: monitoring
    ports:
      - "5432:5432"
    volumes:
      - ./pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  # Сразу добавляем SQL Exporter (чтобы Grafana видела данные из БД)
  sql-exporter:
    image: burningalchemist/sql_exporter
    container_name: sql_exporter
    ports:
      - "9399:9399"
    volumes:
      - ./sql_exporter.yml:/sql_exporter.yml
    depends_on:
      - db
